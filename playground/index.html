<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weave Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <span class="logo">Weave</span>
    <span class="subtitle">Playground</span>
    <button id="share-btn" class="share-btn" title="Copy shareable link to clipboard">Share</button>
  </header>

  <main class="workspace">
    <div class="editor-pane">
      <div id="editor"></div>
    </div>

    <div class="output-pane">
      <section class="panel" id="diagnostics-panel">
        <div class="panel-header">Diagnostics</div>
        <div id="diagnostics-content" class="panel-body">
          <span class="ok-msg">No errors.</span>
        </div>
      </section>

      <section class="panel" id="graph-panel">
        <div class="panel-header">
          Graph
          <select id="def-select" title="Select def"></select>
          <button id="graph-fit-btn" class="graph-fit-btn" title="Fit graph to view">Fit</button>
        </div>
        <div id="graph-svg" class="panel-body graph-body"></div>
      </section>

      <section class="panel" id="ir-panel">
        <div class="panel-header">
          IR
          <span class="ir-tabs">
            <button class="ir-tab active" data-tab="core">Core</button>
            <button class="ir-tab" data-tab="json">JSON</button>
            <button class="ir-tab" data-tab="dump">Dump</button>
          </span>
        </div>
        <pre id="ir-core" class="panel-body ir-body"></pre>
        <pre id="ir-json" class="panel-body ir-body" style="display:none"></pre>
        <pre id="ir-text" class="panel-body ir-body" style="display:none"></pre>
      </section>
    </div>
  </main>

  <script type="module" src="dist/main.js"></script>
</body>
</html>
